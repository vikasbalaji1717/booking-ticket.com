{% extends 'base.html' %}

{% block title %}Sign Up - AeroBus{% endblock %}

{% block content %}
<div id="auth-page" style="display:flex; align-items:center; justify-content:center; padding: 4rem 1rem; min-height: calc(100vh - 12rem);">
  <div class="card-panel" style="width:100%; max-width:520px; box-shadow:var(--shadow-lg);">
    <div style="text-align:center; margin-bottom:1.5rem;">
      <h2 style="margin:0; font-size:1.5rem;">Create an account</h2>
      <p class="text-muted" style="font-size:0.9rem;">Register to book and manage your tickets.</p>
    </div>

    <form id="register-form" method="POST" action="{{ url_for('auth.register') }}">
      <div class="form-group">
        <label for="reg-username">Full Name</label>
        <input type="text" id="reg-username" name="username" class="form-input" placeholder="John Doe" required autocomplete="name">
      </div>

      <div class="form-group">
        <label for="reg-email">Email Address</label>
        <input type="email" id="reg-email" name="email" class="form-input" placeholder="you@domain.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" name="password" class="form-input" placeholder="Choose a secure password" required minlength="6" autocomplete="new-password">
      </div>

      <div class="form-group" style="margin-top:1rem; margin-bottom:1.5rem; display:flex; align-items:center; gap:0.5rem;">
        <input type="checkbox" id="reg-admin-toggle" name="is_admin" value="1" style="height:1.25rem; width:1.25rem; accent-color:var(--primary); cursor:pointer;">
        <label for="reg-admin-toggle" style="margin-bottom:0; cursor:pointer;">Register as <strong>Administrator</strong> (for testing)</label>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%; height:2.75rem; margin-bottom:1rem;">Create Account</button>

      <div style="text-align:center; font-size:0.9rem;" class="text-muted">
        Already have an account? <a href="{{ url_for('views.login_view') }}" class="text-primary-color font-bold">Sign In</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
